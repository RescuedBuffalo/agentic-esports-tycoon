name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_VERSION: "0.11.7"
  PYTHON_VERSION: "3.12"

jobs:
  lint-typecheck-test:
    name: Lint + typecheck + test
    runs-on: ubuntu-latest

    # Postgres + pgvector for the BUF-6 integration tests. Same image the
    # local docker-compose uses, so CI and local exercise the same surface.
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: nexus
          POSTGRES_PASSWORD: nexus
          POSTGRES_DB: nexus
        ports:
          - 5432:5432
        # Health-check so the test step waits for Postgres to accept queries.
        options: >-
          --health-cmd "pg_isready -U nexus -d nexus"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      TEST_DATABASE_URL: postgresql+psycopg://nexus:nexus@localhost:5432/nexus

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Pin Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Sync workspace
        run: uv sync --all-packages

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (black)
        run: uv run black --check .

      - name: Typecheck (mypy)
        run: uv run mypy

      - name: Test + coverage (pytest)
        # ``make coverage`` runs the full suite with line+branch coverage
        # and fails the build if it drops below COVERAGE_FAIL_UNDER (set
        # in the Makefile). Postgres is up via the ``services`` block
        # above, so the @pytest.mark.integration tests run here too.
        run: make coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore
