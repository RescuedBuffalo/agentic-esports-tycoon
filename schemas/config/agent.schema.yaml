$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "aet:config/agent"
title: AgentConfig
description: How each role is controlled and how much it is allowed to spend.
type: object
additionalProperties: false
required: [bindings]
properties:
  bindings:
    type: object
    description: Map from role name (gm, scout, coach, ...) to a backend binding.
    additionalProperties:
      $ref: "#/$defs/Binding"
  budgets:
    type: object
    additionalProperties: false
    description: Per-run spend caps. Sim aborts if any cap is exceeded.
    properties:
      max_llm_input_tokens:
        type: integer
        minimum: 0
        default: 5000000
      max_llm_output_tokens:
        type: integer
        minimum: 0
        default: 1000000
      max_usd:
        type: number
        minimum: 0
        default: 25
$defs:
  Binding:
    type: object
    additionalProperties: false
    required: [backend]
    properties:
      backend:
        type: string
        enum: [scripted, rl, llm]
      policy:
        type: string
        description: For backend=rl, dotted path to a policy class or a checkpoint URI.
      provider:
        type: string
        enum: [anthropic, openai, local]
        description: For backend=llm.
      model:
        type: string
        description: For backend=llm. e.g. claude-opus-4-7 or gpt-4o-mini.
      temperature:
        type: number
        minimum: 0
        maximum: 2
        default: 0.7
      system_prompt_path:
        type: string
        description: For backend=llm, optional file path relative to the run config.
    allOf:
      - if: { properties: { backend: { const: rl } } }
        then: { required: [policy] }
      - if: { properties: { backend: { const: llm } } }
        then: { required: [provider, model] }
