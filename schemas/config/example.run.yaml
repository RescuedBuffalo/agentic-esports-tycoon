# Example run config. Validates against run.schema.yaml + sim.schema.yaml +
# agent.schema.yaml.
run_id: smoke-001
seed: 42
ticks: 365
snapshot_every: 90
paths:
  game_data: ../game/seed
  output: ./out/smoke-001
resume_from: null

tick:
  in_game_minutes: 1440
scheduler:
  max_jobs_per_tick: 256
  job_timeout_ms: 3000
economy:
  currency: USD
  inflation_pct_per_year: 2.0
  starting_capital: 250000
rules:
  enable_streaming_revenue: true
  enable_player_morale: true
  enable_injuries: false

bindings:
  gm:
    backend: llm
    provider: anthropic
    model: claude-opus-4-7
    temperature: 0.4
  scout:
    backend: scripted
  coach:
    backend: rl
    policy: aet.agents.policies.coach.PPOCoach
budgets:
  max_llm_input_tokens: 2000000
  max_llm_output_tokens: 400000
  max_usd: 10
