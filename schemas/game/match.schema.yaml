$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "aet:game/match"
title: Match
description: A scheduled or completed match between two teams.
type: object
additionalProperties: false
required: [id, tournament_id, scheduled_for, home_team_id, away_team_id, best_of]
properties:
  id:
    type: string
    pattern: "^[a-z0-9][a-z0-9_-]{2,63}$"
  tournament_id:
    type: string
    pattern: "^[a-z0-9][a-z0-9_-]{2,63}$"
  scheduled_for:
    type: string
    format: date-time
  home_team_id:
    type: string
    pattern: "^[a-z0-9][a-z0-9_-]{2,63}$"
  away_team_id:
    type: string
    pattern: "^[a-z0-9][a-z0-9_-]{2,63}$"
  best_of:
    type: integer
    enum: [1, 3, 5, 7]
  result:
    type: [object, "null"]
    default: null
    additionalProperties: false
    required: [home_score, away_score, completed_at]
    properties:
      home_score: { type: integer, minimum: 0 }
      away_score: { type: integer, minimum: 0 }
      completed_at: { type: string, format: date-time }
