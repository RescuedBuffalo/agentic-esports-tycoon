$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "aet:game/player"
title: Player
type: object
additionalProperties: false
required: [id, name, role, born, skills]
properties:
  id:
    type: string
    pattern: "^[a-z0-9][a-z0-9_-]{2,63}$"
  name:
    type: string
    minLength: 1
  handle:
    type: string
    description: In-game handle / gamertag.
  role:
    type: string
    enum: [duelist, controller, support, igl, flex]
  born:
    type: string
    format: date
  nationality:
    type: string
    description: ISO 3166-1 alpha-2.
    pattern: "^[A-Z]{2}$"
  skills:
    type: object
    additionalProperties: false
    required: [aim, gamesense, mechanics, communication, mental]
    properties:
      aim:           { type: integer, minimum: 0, maximum: 100 }
      gamesense:     { type: integer, minimum: 0, maximum: 100 }
      mechanics:     { type: integer, minimum: 0, maximum: 100 }
      communication: { type: integer, minimum: 0, maximum: 100 }
      mental:        { type: integer, minimum: 0, maximum: 100 }
  potential:
    type: integer
    minimum: 0
    maximum: 100
    description: Designer-set ceiling. Hidden from the player by default.
  contract:
    type: object
    additionalProperties: false
    properties:
      team_id:
        type: [string, "null"]
      salary_cents_per_year:
        type: integer
        minimum: 0
      ends_on:
        type: string
        format: date
  morale:
    type: integer
    minimum: 0
    maximum: 100
    default: 60
