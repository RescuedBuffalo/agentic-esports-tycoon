$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "aet:game/tournament"
title: Tournament
type: object
additionalProperties: false
required: [id, name, tier, format, starts_on, ends_on, prize_pool_cents]
properties:
  id:
    type: string
    pattern: "^[a-z0-9][a-z0-9_-]{2,63}$"
  name:
    type: string
    minLength: 1
  tier:
    type: string
    enum: [s, a, b, c, qualifier]
  format:
    type: string
    enum: [single_elim, double_elim, round_robin, swiss, bo_series]
  region:
    type: string
    enum: [na, eu, kr, cn, sa, sea, oce, intl]
    default: intl
  starts_on:
    type: string
    format: date
  ends_on:
    type: string
    format: date
  prize_pool_cents:
    type: integer
    minimum: 0
  invited_team_ids:
    type: array
    items:
      type: string
      pattern: "^[a-z0-9][a-z0-9_-]{2,63}$"
  qualifier_for:
    type: [string, "null"]
    description: Tournament id this one qualifies into, or null.
