# Pre-commit hooks: ruff + black + mypy + pytest on changed files.
# Run on demand via `make precommit` or install the git hook with
# `uv run pre-commit install`.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        # mypy needs the project context, not just the staged files.
        pass_filenames: false
        args: [--config-file=pyproject.toml]
        additional_dependencies:
          - pydantic>=2.6
          - numpy>=1.26
          - types-PyYAML

  - repo: local
    hooks:
      - id: pytest-on-changed
        name: pytest (changed files only)
        # `pytest --picked` selects tests touching files in the staged diff.
        # Plugin (pytest-picked) ships in the dev dependency group.
        entry: uv run pytest --picked --mode=branch
        language: system
        pass_filenames: false
        stages: [pre-commit]
