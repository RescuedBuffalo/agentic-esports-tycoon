[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "esports-sim-shared"
version = "0.0.1"
description = "Cross-cutting Pydantic models, RNG tree, and typed clients."
requires-python = ">=3.12,<3.13"
dependencies = [
    "pydantic>=2.6",
    "PyYAML>=6.0",
    "numpy>=1.26",
]

[tool.hatch.build.targets.wheel]
packages = ["src/esports_sim"]
