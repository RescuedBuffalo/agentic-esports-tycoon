[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "esports-sim-shared"
version = "0.0.1"
description = "Cross-cutting Pydantic models, RNG tree, and typed clients."
requires-python = ">=3.12,<3.13"
dependencies = [
    "pydantic>=2.6",
    "PyYAML>=6.0",
    "numpy>=1.26",
    # Anthropic SDK — every Claude call goes through the governor (BUF-22),
    # which wraps client.messages.{create,count_tokens}. Pinned floor matches
    # the SDK we tested adaptive thinking + count_tokens against.
    "anthropic>=0.40",
    # Database substrate (BUF-6). Async path lives in services; this package
    # ships the models + migrations so every consumer agrees on the schema.
    "SQLAlchemy[asyncio]>=2.0",
    "alembic>=1.13",
    "psycopg[binary]>=3.1",
    "asyncpg>=0.29",
    # pgvector Python bindings — registered as a SQLAlchemy type so BUF-28's
    # vector tables can land without re-plumbing types here.
    "pgvector>=0.3",
    # Fuzzy string matcher used by the canonical-id resolver (BUF-7). C-backed
    # implementation of token-set + WRatio scoring; keeps the resolver fast
    # enough that running it inline on every staging row is acceptable.
    "rapidfuzz>=3.6",
]

# Optional extras keep the heavy ML stack out of every install (CI, devs
# who only touch the data pipeline). Production embedding workers install
# the ``embeddings`` extra; the BUF-28 ``SentenceTransformerEmbedder``
# raises a pointed ImportError telling callers to install it if they
# reach the lazy-load path without it present.
[project.optional-dependencies]
# BUF-28 default embedder. ``sentence-transformers`` pulls torch +
# huggingface; the runtime path is lazy-imported so callers that inject
# their own ``Embedder`` don't have to install this.
embeddings = [
    "sentence-transformers>=3.0",
]

[project.scripts]
# Top-level CLI. Subcommands register via add_subparser:
#   nexus budget report        — BUF-22 spend digest
#   nexus run register/ls/show — BUF-69 experiment registry
nexus = "esports_sim.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/esports_sim"]
# Migrations live at packages/shared/alembic/ and are run from the workspace
# root (`make migrate`), not from an installed wheel — consumers don't need
# them at import time.
