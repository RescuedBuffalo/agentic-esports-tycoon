# Local dev stack. Boot with `make dev` (or `docker compose up -d`).
#
# Phase 0 scope: Postgres 16 (with pgvector). Prefect joins as a separate
# profile in a later phase — declared here as a stub so
# `docker compose --profile orchestration up` works once the image is pinned.
# See BUF-5.
#
# Vector storage lives in Postgres via the ``vector`` extension (ADR-006,
# BUF-28); Qdrant was removed once we landed pgvector because the queries
# we actually run are cross-entity SQL JOINs.
#
# Image is intentionally light: no GPU, no model servers. Phase 2 concern.

services:
  postgres:
    # pgvector image is plain Postgres 16 with the vector extension preinstalled
    # — alembic's `CREATE EXTENSION vector` (BUF-6) needs it. ADR-006 puts
    # embeddings on this same instance instead of running Qdrant alongside.
    image: pgvector/pgvector:pg16
    container_name: nexus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nexus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexus}
      POSTGRES_DB: ${POSTGRES_DB:-nexus}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexus} -d ${POSTGRES_DB:-nexus}"]
      interval: 5s
      timeout: 5s
      retries: 10

  prefect:
    image: prefecthq/prefect:3-latest
    container_name: nexus-prefect
    profiles: ["orchestration"]
    restart: unless-stopped
    command: prefect server start --host 0.0.0.0
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: >-
        postgresql+asyncpg://${POSTGRES_USER:-nexus}:${POSTGRES_PASSWORD:-nexus}@postgres:5432/${POSTGRES_DB:-nexus}
    ports:
      - "${PREFECT_PORT:-4200}:4200"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
